<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Verdana, sans-serif;
    background:
        radial-gradient(circle at top left, #b8f5ff, #7fd8ff 40%, #4ab8ff 100%);
    overflow:hidden;
}

/* Frutiger Aero glass panel */
.card{
    text-align:center;
    padding:40px;
    width:420px;
    border-radius:30px;
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(10px);
    border:2px solid rgba(255,255,255,0.6);
    box-shadow:
        inset 0 2px 10px rgba(255,255,255,0.9),
        0 15px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ffffff;
    text-shadow:0 2px 4px rgba(0,0,0,0.3);
}

.buttons{
    margin-top:25px;
}

button{
    padding:12px 30px;
    margin:10px;
    border:none;
    border-radius:999px;
    font-size:18px;
    cursor:pointer;
    color:white;
    background:linear-gradient(#8efc9b,#35c84b);
    box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.8),
        0 4px 10px rgba(0,0,0,0.2);
}

button.no{
    background:linear-gradient(#ffb3b3,#ff5e5e);
}

#result{
    margin-top:25px;
    font-size:24px;
    color:white;
    text-shadow:0 2px 4px rgba(0,0,0,0.3);
}

.message{
    display:block;
    margin-top:15px;
    font-size:28px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
    <h1>do you love me?</h1>

    <div class="buttons">
        <button onclick="yesAnswer()">Yes</button>
        <button class="no" onclick="noAnswer()">No</button>
    </div>

    <div id="result"></div>
</div>

<script>
function yesAnswer() {
    document.getElementById("result").innerHTML =
        "😊 😊 😄 😃 😁 😊 😄 😃 😊 😁 😄 😊 😃 😁 😊 😄 😃 😊 😁" +
        '<span class="message">aww,i love you back!</span>';
}

function noAnswer() {
    document.getElementById("result").innerHTML =
        "😢 😭 😠 😞 😡 😢 😭 😠 😞 😡 😢" +
        '<span class="message">but.. i love youuu</span>';
}
</script>

</body>
</html>
